base = ".."

[[input]]
name = "system-requirements"
dir = "SYS"
driver = "obsidian"
atype = "SYS"

[[input]]
name = "system-diagrams"
dir = "SYS"
driver = "sidecar"
atype = "SYS"
filter = "**/*.png"

[[input]]
name = "software-requirements"
dir = "REQ"
driver = "obsidian"
atype = "REQ"

[[input]]
name = "implementation"
dir = "src"
driver = "text"
atype = "SRC"

[[input]]
name = "verification"
dir = "tests"
driver = "text"
atype = "TEST"

[metrics]
enabled = true
requirement_type = "REQ"
status_field = "status"
verify_field = "verify"
tbd_marker = "TBD"
output_format = "markdown"
output_file = "output/metrics.md"

[impact]
enabled = true
output_format = "markdown"
output_file = "output/impact.md"

[metamodel]
filename = "project.syntagmax"

