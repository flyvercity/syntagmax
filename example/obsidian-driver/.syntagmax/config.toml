base = ".."

[[input]]
name = "system-requirements"
dir = "SYS"
driver = "obsidian"
atype = "SYS"
markers = ["COM", "NOTE"]

[[input]]
name = "system-diagrams"
dir = "SYS"
driver = "sidecar"
atype = "SYS"
filter = "**/*.png"

[[input]]
name = "software-requirements"
dir = "REQ"
driver = "obsidian"
atype = "REQ"

[[input]]
name = "implementation"
dir = "src"
driver = "text"
atype = "SRC"

[[input]]
name = "verification"
dir = "tests"
driver = "text"
atype = "TEST"

[metrics]
enabled = true
requirement_type = "REQ"
status_field = "status"
verify_field = "verify"
tbd_marker = "TBD"

[impact]
enabled = true

[metamodel]
filename = "project.syntagmax"

