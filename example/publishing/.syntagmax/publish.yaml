start_level: 1
include_plain_text: true
remove_numeric_prefixes_in_headers: true

ignore_plain_text_prefixes:
  - "#"
  - ">"
  - "!"

render:
  SRS:
    - type: table
      attributes:
        - id:
            alias: "ID"
        - type:
            alias: "ObjType"
        - parent:
            alias: "SoR"
        - safety:
            alias: "SFTY"
        - func:
            alias: "Function"
    - type: text
      mode: block
      attributes:
        - contents:
            alias: "Requirement"
    - type: text
      mode: inline
      attributes:
        - RATIO:
            alias: "Rationale"
        - COMMENT:
            alias: "Comment"
  COM:
    - type: text
      mode: block
      alias: "Comment"
