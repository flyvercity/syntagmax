<svg xmlns="http://www.w3.org/2000/svg" width="700" height="420" font-family="Arial, sans-serif" font-size="13">

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="15" font-weight="bold">Personal Scheduler — Application Architecture</text>

  <!-- User Interface layer -->
  <rect x="50" y="55" width="600" height="55" rx="6" fill="#dce8f9" stroke="#4a7abf" stroke-width="1.5"/>
  <text x="350" y="77" text-anchor="middle" font-weight="bold">User Interface Layer</text>
  <text x="350" y="97" text-anchor="middle" fill="#555">Mobile App (iOS / Android) · Desktop App (Windows / macOS) · Web App</text>

  <!-- Arrows down -->
  <line x1="185" y1="110" x2="145" y2="148" stroke="#4a7abf" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="350" y1="110" x2="350" y2="148" stroke="#4a7abf" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="515" y1="110" x2="555" y2="148" stroke="#4a7abf" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Core modules -->
  <rect x="50" y="150" width="170" height="65" rx="6" fill="#d5f0e0" stroke="#3a9a5c" stroke-width="1.5"/>
  <text x="135" y="177" text-anchor="middle" font-weight="bold">Calendar Module</text>
  <text x="135" y="197" text-anchor="middle" fill="#555">Events · Recurring</text>
  <text x="135" y="212" text-anchor="middle" fill="#555">Day / Week / Month</text>

  <rect x="265" y="150" width="170" height="65" rx="6" fill="#d5f0e0" stroke="#3a9a5c" stroke-width="1.5"/>
  <text x="350" y="177" text-anchor="middle" font-weight="bold">Task Module</text>
  <text x="350" y="197" text-anchor="middle" fill="#555">To-Do Lists · Priorities</text>
  <text x="350" y="212" text-anchor="middle" fill="#555">Tags · Deadlines</text>

  <rect x="480" y="150" width="170" height="65" rx="6" fill="#d5f0e0" stroke="#3a9a5c" stroke-width="1.5"/>
  <text x="565" y="177" text-anchor="middle" font-weight="bold">Reminder Module</text>
  <text x="565" y="197" text-anchor="middle" fill="#555">Push Notifications</text>
  <text x="565" y="212" text-anchor="middle" fill="#555">Email · Sound Alerts</text>

  <!-- Arrows down to sync -->
  <line x1="135" y1="215" x2="280" y2="298" stroke="#4a7abf" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="350" y1="215" x2="350" y2="298" stroke="#4a7abf" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="565" y1="215" x2="420" y2="298" stroke="#4a7abf" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Sync / Storage layer -->
  <rect x="50" y="300" width="270" height="60" rx="6" fill="#fdf0d0" stroke="#c8972a" stroke-width="1.5"/>
  <text x="185" y="326" text-anchor="middle" font-weight="bold">Sync Service</text>
  <text x="185" y="346" text-anchor="middle" fill="#555">Cloud · Cross-Device Sync</text>

  <rect x="380" y="300" width="270" height="60" rx="6" fill="#fdf0d0" stroke="#c8972a" stroke-width="1.5"/>
  <text x="515" y="326" text-anchor="middle" font-weight="bold">Local Data Storage</text>
  <text x="515" y="346" text-anchor="middle" fill="#555">SQLite · Encrypted at Rest</text>

  <!-- Arrow between storage boxes -->
  <line x1="320" y1="330" x2="380" y2="330" stroke="#c8972a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrs)"/>

  <!-- Auth box on side -->
  <rect x="50" y="380" width="600" height="30" rx="6" fill="#f0e0f8" stroke="#8a50af" stroke-width="1.5"/>
  <text x="350" y="400" text-anchor="middle" font-weight="bold" fill="#5a2080">Authentication &amp; Security Layer (OAuth 2.0 · Biometric · End-to-End Encryption)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a7abf"/>
    </marker>
    <marker id="arrs" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c8972a"/>
    </marker>
  </defs>
</svg>
